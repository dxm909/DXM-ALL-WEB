<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEVELOPER X MANSIB | The Brain</title>
    <link rel="preload" as="image" href="https://i.ibb.co.com/QF7nx3jT/logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Hind+Siliguri:wght@400;600&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #030712; color: #f3f4f6; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(74, 222, 128, 0.1); transition: 0.4s; }
        .glass:hover { border-color: #4ade80; background: rgba(74, 222, 128, 0.05); transform: translateY(-8px); box-shadow: 0 10px 30px rgba(74, 222, 128, 0.2); }
        .neon-glow { border: 2px solid #4ade80; box-shadow: 0 0 20px rgba(74, 222, 128, 0.4); }
        .bg-gradient { background: radial-gradient(circle at top, #111827 0%, #030712 100%); }
    </style>
</head>
<body class="bg-gradient min-h-screen">

    <div class="max-w-6xl mx-auto py-16 px-6">
        <!-- হেডার সেকশন -->
        <header class="text-center mb-20">
            <div class="relative inline-block mb-8">
                <img src="https://i.ibb.co.com/QF7nx3jT/logo.jpg" alt="DXM" class="w-32 h-32 md:w-40 md:h-40 rounded-3xl neon-glow object-cover">
            </div>
            <h1 class="orbitron text-4xl md:text-7xl font-black tracking-tighter text-white mb-6">
                DEVELOPER <span class="text-green-500">X</span> MANSIB
            </h1>
            <p class="text-gray-400 text-lg md:text-xl italic max-w-2xl mx-auto border-b border-gray-800 pb-8">
                "এটি আমার সকল প্রজেক্টের মগজ। এখান থেকে আমার সমস্ত ডিজিটাল কর্মকাণ্ড এবং ওয়েবসাইটের নেটওয়ার্ক নিয়ন্ত্রিত হয়।"
            </p>
            <p class="text-green-400 font-bold mt-8 tracking-widest animate-pulse uppercase text-sm">
                — My Digital Network —
            </p>
        </header>

        <!-- প্রজেক্ট গ্রিড -->
        <main class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8" id="site-grid">
            <div class="col-span-full text-center text-gray-500 italic">প্রজেক্ট লোড হচ্ছে...</div>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUKHoMMTbE0kyG6LhDG13WGgIyymn2Ycg",
            authDomain: "dxm-all-web.firebaseapp.com",
            projectId: "dxm-all-web",
            storageBucket: "dxm-all-web.firebasestorage.app",
            messagingSenderId: "591956542010",
            appId: "1:591956542010:web:321234c73910c9aea36b03"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const q = query(collection(db, "projects"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const grid = document.getElementById('site-grid');
            grid.innerHTML = "";
            snapshot.forEach((doc) => {
                const project = doc.data();
                grid.innerHTML += `
                    <a href="${project.url}" target="_blank" class="glass p-8 rounded-3xl block group">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-2xl font-bold text-white group-hover:text-green-400">${project.name}</h2>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-500 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                            </svg>
                        </div>
                        <p class="text-gray-400 text-sm leading-relaxed mb-6">${project.desc}</p>
                        <span class="text-green-500 font-bold text-xs uppercase tracking-tighter">Visit Project →</span>
                    </a>`;
            });
        });
    </script>
</body>
</html>
